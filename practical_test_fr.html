<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Claude Certified Architect — Test pratique</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  font-size: 16px;
  line-height: 1.6;
  background: #f0f2f5;
  color: #1a1a2e;
  min-height: 100vh;
}

.shell { display: flex; height: 100vh; overflow: hidden; }

/* Sidebar */
.sidebar {
  width: 260px; min-width: 260px;
  background: #1a1a2e; color: #cdd3de;
  display: flex; flex-direction: column; overflow: hidden;
}
.sidebar-header {
  padding: 20px 16px 14px;
  font-size: 13px; font-weight: 700;
  letter-spacing: .06em; text-transform: uppercase;
  color: #7f8fa6; border-bottom: 1px solid #2c2c4a; flex-shrink: 0;
}
.sidebar-progress {
  padding: 10px 16px; font-size: 12px; color: #7f8fa6;
  border-bottom: 1px solid #2c2c4a; flex-shrink: 0;
}
.sidebar-progress span { color: #e2e8f0; font-weight: 600; }
.sidebar-scroll { overflow-y: auto; flex: 1; padding: 8px 0; }
.sidebar-scroll::-webkit-scrollbar { width: 4px; }
.sidebar-scroll::-webkit-scrollbar-thumb { background: #2c2c4a; border-radius: 2px; }

.scenario-group { margin-bottom: 4px; }
.scenario-label {
  padding: 6px 16px 4px; font-size: 10.5px; font-weight: 700;
  letter-spacing: .08em; text-transform: uppercase; color: #4a5568;
}
.q-btn {
  display: flex; align-items: center; gap: 8px;
  width: 100%; padding: 6px 16px;
  background: none; border: none; cursor: pointer;
  font-size: 13.5px; color: #a0aec0; text-align: left;
  transition: background .15s, color .15s;
  border-left: 3px solid transparent;
}
.q-btn:hover { background: #242447; color: #e2e8f0; }
.q-btn.active { background: #1e3a5f; color: #63b3ed; border-left-color: #63b3ed; }
.q-btn.answered-correct { color: #68d391; }
.q-btn.answered-correct .q-dot { background: #68d391; }
.q-btn.answered-wrong { color: #fc8181; }
.q-btn.answered-wrong .q-dot { background: #fc8181; }
.q-dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: #4a5568; flex-shrink: 0; transition: background .2s;
}

/* Main */
.main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.topbar {
  background: #fff; border-bottom: 1px solid #e2e8f0;
  padding: 12px 32px; display: flex; align-items: center;
  justify-content: space-between; flex-shrink: 0;
  box-shadow: 0 1px 3px rgba(0,0,0,.06);
}
.topbar-title { font-size: 15px; font-weight: 600; color: #2d3748; }
.topbar-nav { display: flex; gap: 10px; align-items: center; }
.nav-btn {
  padding: 7px 18px; border-radius: 8px;
  border: 1.5px solid #cbd5e0; background: #fff;
  font-size: 14px; cursor: pointer; color: #4a5568; font-weight: 500;
  transition: all .15s;
}
.nav-btn:hover { background: #edf2f7; border-color: #a0aec0; }
.nav-btn:disabled { opacity: .35; cursor: default; }
.nav-btn.finish { background: #2b6cb0; color: #fff; border-color: #2b6cb0; }
.nav-btn.finish:hover { background: #2c5282; }
.q-counter { font-size: 13px; color: #718096; font-weight: 500; }

.content { flex: 1; overflow-y: auto; padding: 36px 48px; }
.content::-webkit-scrollbar { width: 6px; }
.content::-webkit-scrollbar-thumb { background: #cbd5e0; border-radius: 3px; }

/* Question card */
.q-card { max-width: 820px; margin: 0 auto; }
.q-scenario {
  display: inline-block; background: #ebf8ff; color: #2b6cb0;
  font-size: 12px; font-weight: 700; letter-spacing: .05em;
  text-transform: uppercase; padding: 4px 12px;
  border-radius: 20px; margin-bottom: 16px;
}
.q-number { font-size: 13px; color: #a0aec0; margin-bottom: 6px; font-weight: 600; }
.q-situation {
  font-size: 16.5px; color: #1a202c;
  font-weight: 500; line-height: 1.7;
  background: #fff;
  border: 1.5px solid #d0dff0;
  border-radius: 10px;
  padding: 16px 20px;
  box-shadow: 0 1px 4px rgba(0,0,0,.06);
  margin-bottom: 22px;
}
.q-situation code, .opt-text code, .explanation code {
  background: #e2e8f0; padding: 1px 5px; border-radius: 4px;
  font-family: "SF Mono", Menlo, Monaco, monospace;
  font-size: 13.5px; color: #2d3748;
}
.explanation code { background: #feebc8; }
.q-prompt { font-size: 17px; font-weight: 700; color: #1a202c; margin-bottom: 20px; }

/* Options */
.options { display: flex; flex-direction: column; gap: 10px; margin-bottom: 24px; }
.option {
  display: flex; align-items: flex-start; gap: 14px;
  padding: 14px 18px; border: 2px solid #e2e8f0;
  border-radius: 12px; cursor: pointer; background: #fff;
  transition: border-color .15s, background .15s, transform .1s;
}
.option:hover:not(.locked) {
  border-color: #90cdf4; background: #ebf8ff; transform: translateX(2px);
}
.option.locked { cursor: default; }
.opt-letter {
  width: 30px; height: 30px; min-width: 30px; border-radius: 50%;
  background: #edf2f7; display: flex; align-items: center; justify-content: center;
  font-weight: 700; font-size: 14px; color: #4a5568;
  transition: background .2s, color .2s; flex-shrink: 0;
}
.opt-text { font-size: 15px; color: #2d3748; line-height: 1.55; padding-top: 3px; }

.option.correct { border-color: #48bb78; background: #f0fff4; }
.option.correct .opt-letter { background: #48bb78; color: #fff; }
.option.wrong { border-color: #fc8181; background: #fff5f5; }
.option.wrong .opt-letter { background: #fc8181; color: #fff; }
.option.dimmed { opacity: .55; }

/* Explanation */
.explanation {
  margin-top: 4px; padding: 14px 18px;
  background: #fffbeb; border-left: 4px solid #f6ad55;
  border-radius: 0 10px 10px 0;
  font-size: 14.5px; color: #744210; line-height: 1.65; display: none;
}
.explanation.show { display: block; }
.explanation strong { color: #744210; }

/* Summary */
.summary { max-width: 820px; margin: 0 auto; display: none; }
.summary.show { display: block; }
.summary h1 { font-size: 26px; font-weight: 800; color: #1a202c; margin-bottom: 6px; }
.summary-subtitle { color: #718096; font-size: 15px; margin-bottom: 28px; }
.score-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 16px; margin-bottom: 32px; }
.score-card {
  background: #fff; border-radius: 14px; padding: 20px;
  text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,.07);
}
.score-card .big { font-size: 38px; font-weight: 800; line-height: 1; margin-bottom: 6px; }
.score-card .label { font-size: 13px; color: #718096; font-weight: 600; text-transform: uppercase; letter-spacing: .05em; }
.score-card.total .big { color: #2b6cb0; }
.score-card.correct-c .big { color: #38a169; }
.score-card.wrong-c .big { color: #e53e3e; }

.section-title {
  font-size: 18px; font-weight: 700; color: #2d3748;
  margin-bottom: 12px; padding-bottom: 6px; border-bottom: 2px solid #e2e8f0;
}
.group-block {
  background: #fff; border-radius: 12px; padding: 18px 20px;
  margin-bottom: 16px; box-shadow: 0 1px 4px rgba(0,0,0,.06);
}
.group-title {
  font-size: 15px; font-weight: 700; color: #2d3748;
  margin-bottom: 12px; display: flex; align-items: center; gap: 10px;
}
.group-badge {
  font-size: 11px; padding: 2px 10px; border-radius: 20px;
  font-weight: 700; background: #fff5f5; color: #c53030;
}
.wrong-item {
  display: flex; gap: 10px; align-items: flex-start;
  padding: 12px 0; border-bottom: 1px solid #f0f0f0;
  font-size: 14px; color: #4a5568;
}
.wrong-item:last-child { border-bottom: none; }
.wrong-item .wi-n { min-width: 32px; font-weight: 700; color: #a0aec0; font-size: 12px; padding-top: 2px; }
.wrong-item .wi-q { flex: 1; }
.wrong-item .wi-situation { font-size: 13.5px; color: #2d3748; font-weight: 500; margin-bottom: 4px; line-height: 1.5; }
.wrong-item .wi-situation code { background: #e2e8f0; padding: 1px 4px; border-radius: 3px; font-family: "SF Mono", Menlo, Monaco, monospace; font-size: 12.5px; }
.wrong-item .wi-prompt { font-size: 13px; color: #718096; font-style: italic; margin-bottom: 4px; }
.wrong-item .wi-ans { font-size: 12px; margin-top: 3px; color: #718096; }
.wi-wrong-tag { color: #e53e3e; font-weight: 700; }
.wi-correct-tag { color: #38a169; font-weight: 700; }

.restart-btn {
  margin-top: 28px; padding: 12px 32px;
  background: #2b6cb0; color: #fff; border: none;
  border-radius: 10px; font-size: 15px; font-weight: 700;
  cursor: pointer; transition: background .15s;
}
.restart-btn:hover { background: #2c5282; }

.screen { display: none; }
.screen.active { display: block; }
</style>
</head>
<body>
<div class="shell">
  <nav class="sidebar">
    <div class="sidebar-header">Questions</div>
    <div class="sidebar-progress">Répondu : <span id="answeredCount">0</span> / <span id="totalCount">0</span></div>
    <div class="sidebar-scroll" id="sidebarList"></div>
  </nav>
  <div class="main">
    <div class="topbar">
      <div class="topbar-title">Claude Certified Architect — Test pratique</div>
      <div class="topbar-nav">
        <span class="q-counter" id="qCounter"></span>
        <button class="nav-btn" id="prevBtn" onclick="navigate(-1)" disabled>&#8592; Précédent</button>
        <button class="nav-btn" id="nextBtn" onclick="navigate(1)">Suivant &#8594;</button>
        <button class="nav-btn finish" id="finishBtn" onclick="showSummary()">Terminer et réviser</button>
      </div>
    </div>
    <div class="content">
      <div class="screen active" id="questionScreen">
        <div class="q-card" id="qCard"></div>
      </div>
      <div class="screen" id="summaryScreen">
        <div class="summary show" id="summaryContent"></div>
      </div>
    </div>
  </div>
</div>
<script>
const QUESTIONS = [{"n": 1, "scenario": "Système de recherche multi-agents", "situation": "Un agent d'analyse de documents découvre que deux sources crédibles contiennent des statistiques directement contradictoires pour une métrique clé : un rapport gouvernemental indique une croissance de 40 %, tandis qu'une analyse sectorielle indique 12 %. Les deux sources paraissent crédibles, et l'écart pourrait affecter de manière significative les conclusions de la recherche. Comment l'agent d'analyse de documents doit-il gérer cette situation le plus efficacement ?", "question": "Quelle approche est la plus efficace ?", "options": [{"letter": "A", "text": "Appliquer des heuristiques de crédibilité pour choisir le nombre le plus probablement correct, terminer l'analyse avec cette valeur et ajouter une note de bas de page mentionnant l'écart.", "correct": false}, {"letter": "B", "text": "Inclure les deux nombres dans la sortie d'analyse sans les marquer comme contradictoires, laissant l'agent de synthèse décider lequel utiliser selon un contexte plus large.", "correct": false}, {"letter": "C", "text": "Arrêter l'analyse et escalader immédiatement vers le coordinateur, en lui demandant de décider quelle source fait le plus autorité avant de continuer.", "correct": false}, {"letter": "D", "text": "Terminer l'analyse avec les deux nombres, annoter explicitement le conflit avec l'attribution des sources, et laisser le coordinateur décider comment réconcilier les données avant de les transmettre à la synthèse.", "correct": true}], "correct": "D", "explanation": "Cette approche préserve la séparation des responsabilités : l'agent d'analyse termine son travail principal sans blocage, préserve les deux valeurs contradictoires avec une attribution claire, et transmet correctement la réconciliation au coordinateur, qui dispose d'un contexte plus large.", "global_n": 1}, {"n": 2, "scenario": "Système de recherche multi-agents", "situation": "Les agents de recherche web et d'analyse de documents ont terminé leurs tâches et renvoyé les résultats au coordinateur. Quelle est l'étape suivante pour créer un rapport de recherche intégré ?", "question": "Quelle étape suivante est la plus appropriée ?", "options": [{"letter": "A", "text": "Chaque agent envoie ses résultats directement à l'agent de rédaction de rapport, en contournant le coordinateur.", "correct": false}, {"letter": "B", "text": "L'agent d'analyse de documents demande les résultats de la recherche web et les fusionne en interne.", "correct": false}, {"letter": "C", "text": "Le coordinateur transmet les deux ensembles de résultats à l'agent de synthèse pour une intégration unifiée.", "correct": true}, {"letter": "D", "text": "Le coordinateur concatène les sorties brutes des deux agents et les renvoie comme résultat final.", "correct": false}], "correct": "C", "explanation": "Dans une architecture coordinateur–sous-agent, le coordinateur transmet les deux ensembles de résultats à l'agent de synthèse pour une intégration centralisée, préservant le contrôle et assurant une fusion de haute qualité.", "global_n": 2}, {"n": 3, "scenario": "Système de recherche multi-agents", "situation": "Un sous-agent d'analyse de documents échoue fréquemment lors du traitement de fichiers PDF : certains ont des sections corrompues qui déclenchent des exceptions d'analyse, d'autres sont protégés par mot de passe, et parfois la bibliothèque d'analyse se bloque sur de gros fichiers. Actuellement, toute exception termine immédiatement le sous-agent et renvoie une erreur au coordinateur, qui doit décider de réessayer, d'ignorer ou de faire échouer toute la tâche. Cela entraîne une implication excessive du coordinateur dans la gestion d'erreurs routinières. Quelle amélioration architecturale est la plus efficace ?", "question": "Quelle amélioration est la plus efficace ?", "options": [{"letter": "A", "text": "Créer un agent dédié à la gestion des erreurs qui surveille tous les échecs via une file partagée et décide des actions de récupération, en envoyant des commandes de redémarrage directement aux sous-agents.", "correct": false}, {"letter": "B", "text": "Configurer le sous-agent pour qu'il renvoie toujours des résultats partiels avec un statut de succès, en intégrant les détails d'erreur dans les métadonnées ; le coordinateur traite toutes les réponses comme réussies.", "correct": false}, {"letter": "C", "text": "Faire valider tous les documents par le coordinateur avant de les envoyer au sous-agent, en rejetant les documents susceptibles de provoquer des échecs.", "correct": false}, {"letter": "D", "text": "Implémenter une récupération locale dans le sous-agent pour les échecs transitoires et n'escalader vers le coordinateur que les erreurs qu'il ne peut pas résoudre, en incluant les étapes tentées et les résultats partiels.", "correct": true}], "correct": "D", "explanation": "Gérer les erreurs au niveau le plus bas capable de les résoudre. La récupération locale réduit la charge du coordinateur tout en escaladant les problèmes véritablement irrécupérables avec le contexte complet et la progression partielle.", "global_n": 3}, {"n": 4, "scenario": "Système de recherche multi-agents", "situation": "Après avoir exécuté le système sur « l'impact de l'IA sur les industries créatives », vous observez que chaque sous-agent se termine avec succès : l'agent de recherche web trouve des articles pertinents, l'agent d'analyse de documents les résume correctement, et l'agent de synthèse produit un texte cohérent. Cependant, les rapports finaux ne couvrent que les arts visuels et manquent complètement la musique, la littérature et le cinéma. Dans les logs du coordinateur, vous voyez qu'il a décomposé le sujet en trois sous-tâches : « IA dans l'art numérique », « IA dans le design graphique » et « IA dans la photographie ». Quelle est la cause racine la plus probable ?", "question": "Quelle est la cause racine la plus probable ?", "options": [{"letter": "A", "text": "L'agent de synthèse manque d'instructions pour détecter les lacunes de couverture.", "correct": false}, {"letter": "B", "text": "L'agent d'analyse de documents filtre les sources non visuelles à cause de critères de pertinence trop stricts.", "correct": false}, {"letter": "C", "text": "La décomposition de tâche du coordinateur est trop étroite, assignant aux sous-agents un travail qui ne couvre pas tous les domaines pertinents.", "correct": true}, {"letter": "D", "text": "Les requêtes de l'agent de recherche web sont insuffisantes et devraient être élargies pour couvrir plus de secteurs.", "correct": false}], "correct": "C", "explanation": "Le coordinateur a décomposé un sujet large uniquement en sous-tâches d'arts visuels, manquant entièrement la musique, la littérature et le cinéma. Puisque les sous-agents ont correctement exécuté leurs assignations, la décomposition trop étroite est la cause racine évidente.", "global_n": 4}, {"n": 5, "scenario": "Système de recherche multi-agents", "situation": "Le sous-agent de recherche web renvoie des résultats pour seulement 3 des 5 catégories de sources demandées (les sites concurrents et les rapports sectoriels réussissent, mais les archives d'actualités et les flux sociaux dépassent le délai). Le sous-agent d'analyse de documents traite avec succès tous les documents fournis. Le sous-agent de synthèse doit produire un résumé à partir d'entrées en amont de qualité mixte. Quelle stratégie de propagation d'erreurs est la plus efficace ?", "question": "Quelle stratégie de propagation d'erreurs est la plus efficace ?", "options": [{"letter": "A", "text": "Poursuivre la synthèse en utilisant uniquement les sources réussies et produire une sortie sans mentionner quelles données étaient indisponibles.", "correct": false}, {"letter": "B", "text": "Le sous-agent de synthèse renvoie une erreur au coordinateur, déclenchant une nouvelle tentative complète ou un échec de tâche en raison de données incomplètes.", "correct": false}, {"letter": "C", "text": "Le sous-agent de synthèse demande au coordinateur de réessayer les sources en timeout avec un délai plus long avant de démarrer la synthèse.", "correct": false}, {"letter": "D", "text": "Structurer la sortie de synthèse avec des annotations de couverture qui indiquent quelles conclusions sont bien étayées et où subsistent des lacunes dues à des sources indisponibles.", "correct": true}], "correct": "D", "explanation": "Les annotations de couverture mettent en œuvre une dégradation gracieuse avec transparence, préservant la valeur du travail accompli tout en propageant l'incertitude pour permettre des décisions éclairées sur la confiance.", "global_n": 5}, {"n": 6, "scenario": "Système de recherche multi-agents", "situation": "Le sous-agent d'analyse de documents rencontre un fichier PDF corrompu qu'il ne peut pas analyser. Lors de la conception de la gestion d'erreurs du système, quelle est la manière la plus efficace de gérer cet échec ?", "question": "Quelle approche est la plus efficace ?", "options": [{"letter": "A", "text": "Renvoyer une erreur avec contexte à l'agent coordinateur, lui permettant de décider comment procéder.", "correct": true}, {"letter": "B", "text": "Ignorer silencieusement le document corrompu et continuer à traiter les fichiers restants pour éviter d'interrompre le workflow.", "correct": false}, {"letter": "C", "text": "Réessayer automatiquement d'analyser le document trois fois avec backoff exponentiel avant de signaler un échec.", "correct": false}, {"letter": "D", "text": "Lever une exception qui termine tout le workflow de recherche.", "correct": false}], "correct": "A", "explanation": "Renvoyer une erreur avec contexte au coordinateur est l'approche la plus efficace car elle lui permet de prendre une décision éclairée — ignorer le fichier, essayer une méthode d'analyse alternative ou notifier l'utilisateur — tout en gardant une visibilité sur l'échec.", "global_n": 6}, {"n": 7, "scenario": "Système de recherche multi-agents", "situation": "Les logs de production montrent un motif persistant : des requêtes comme « analyse le rapport trimestriel téléversé » sont routées vers l'agent de recherche web 45 % du temps au lieu de l'agent d'analyse de documents. En examinant les définitions d'outils, vous constatez que l'agent de recherche web a un outil `analyze_content` décrit comme « analyzes content and extracts key information », tandis que l'agent d'analyse de documents a un outil `analyze_document` décrit comme « analyzes documents and extracts key information ». Comment corriger le problème de mauvais routage ?", "question": "Comment corriger le problème de mauvais routage ?", "options": [{"letter": "A", "text": "Ajouter un classificateur de pré-routage qui détecte si l'utilisateur fait référence à des fichiers téléversés ou à du contenu web avant que le coordinateur ne décide de la délégation.", "correct": false}, {"letter": "B", "text": "Renommer l'outil de recherche web en `extract_web_results` et mettre à jour sa description en « processes and returns information retrieved from web search and URLs ».", "correct": true}, {"letter": "C", "text": "Ajouter des exemples few-shot au prompt du coordinateur montrant le routage correct : « L'utilisateur téléverse un rapport trimestriel → agent d'analyse de documents » et « L'utilisateur pose une question sur une page web → agent de recherche web ».", "correct": false}, {"letter": "D", "text": "Étendre la description de l'outil d'analyse de documents avec des exemples d'usage comme « À utiliser pour les PDF téléversés, les docs Word et les feuilles de calcul », en laissant l'outil de recherche web inchangé.", "correct": false}], "correct": "B", "explanation": "Renommer l'outil de recherche web en `extract_web_results` et mettre à jour sa description pour référencer explicitement la recherche web et les URL supprime directement la cause racine en éliminant le chevauchement sémantique entre les deux noms et descriptions d'outils. Cela rend l'objectif de chaque outil sans ambiguïté, permettant au coordinateur de distinguer de manière fiable l'analyse de documents de la recherche web.", "global_n": 7}, {"n": 8, "scenario": "Système de recherche multi-agents", "situation": "Un collègue propose que l'agent d'analyse de documents envoie ses résultats directement à l'agent de synthèse, en contournant le coordinateur. Quel est le principal avantage de garder le coordinateur comme hub central pour toute communication entre sous-agents ?", "question": "Quel est le principal avantage de garder le coordinateur comme hub central ?", "options": [{"letter": "A", "text": "Le coordinateur peut observer toutes les interactions, gérer les erreurs de manière uniforme et décider quelles informations chaque sous-agent doit recevoir.", "correct": true}, {"letter": "B", "text": "Le coordinateur regroupe plusieurs requêtes vers les sous-agents, réduisant le nombre total d'appels API et la latence globale.", "correct": false}, {"letter": "C", "text": "Le routage via le coordinateur permet une logique de nouvelle tentative automatique que les appels directs entre agents ne peuvent pas prendre en charge.", "correct": false}, {"letter": "D", "text": "Les sous-agents utilisent une mémoire isolée, et la communication directe nécessiterait une sérialisation complexe que seul le coordinateur peut effectuer.", "correct": false}], "correct": "A", "explanation": "Le modèle de coordinateur fournit une visibilité centralisée sur toutes les interactions, une gestion d'erreurs uniforme dans tout le système et un contrôle fin sur les informations que chaque sous-agent reçoit — ce sont les principaux avantages d'une topologie de communication en étoile.", "global_n": 8}, {"n": 9, "scenario": "Système de recherche multi-agents", "situation": "Le sous-agent de recherche web dépasse son délai en recherchant un sujet complexe. Vous devez concevoir la façon dont l'information sur cet échec est renvoyée au coordinateur. Quelle approche de propagation d'erreurs permet le mieux une récupération intelligente ?", "question": "Quelle approche de propagation d'erreurs permet le mieux une récupération intelligente ?", "options": [{"letter": "A", "text": "Renvoyer un contexte d'erreur structuré au coordinateur incluant le type d'échec, la requête exécutée, tout résultat partiel et les approches alternatives potentielles.", "correct": true}, {"letter": "B", "text": "Capturer le timeout dans le sous-agent et renvoyer un ensemble de résultats vide marqué comme réussi.", "correct": false}, {"letter": "C", "text": "Implémenter des nouvelles tentatives automatiques avec backoff exponentiel dans le sous-agent, ne renvoyant un statut générique « recherche indisponible » qu'après épuisement des tentatives.", "correct": false}, {"letter": "D", "text": "Propager l'exception de timeout directement au gestionnaire de haut niveau, terminant tout le workflow de recherche.", "correct": false}], "correct": "A", "explanation": "Renvoyer un contexte d'erreur structuré — incluant le type d'échec, la requête exécutée, les résultats partiels et les approches alternatives — donne au coordinateur tout ce dont il a besoin pour prendre des décisions de récupération intelligentes (p. ex. réessayer avec une requête modifiée ou continuer avec des résultats partiels). Cela préserve un maximum de contexte pour une prise de décision éclairée au niveau de la coordination.", "global_n": 9}, {"n": 10, "scenario": "Système de recherche multi-agents", "situation": "Dans votre conception, vous avez donné à l'agent d'analyse de documents l'accès à un outil polyvalent `fetch_url` afin qu'il puisse télécharger des documents par URL. Les logs de production montrent que cet agent télécharge maintenant fréquemment des pages de résultats de moteurs de recherche pour effectuer des recherches web ad hoc — un comportement qui devrait passer par l'agent de recherche web — causant des résultats incohérents. Quelle correction est la plus efficace ?", "question": "Quelle correction est la plus efficace ?", "options": [{"letter": "A", "text": "Remplacer `fetch_url` par un outil `load_document` qui valide que les URL pointent vers des formats de documents.", "correct": true}, {"letter": "B", "text": "Retirer `fetch_url` de l'agent d'analyse de documents et router toute récupération d'URL via le coordinateur vers l'agent de recherche web.", "correct": false}, {"letter": "C", "text": "Implémenter un filtrage qui bloque les appels `fetch_url` vers les domaines de moteurs de recherche connus tout en autorisant les autres URL.", "correct": false}, {"letter": "D", "text": "Ajouter des instructions au prompt de l'agent d'analyse de documents indiquant que `fetch_url` ne doit servir qu'à télécharger des URL de documents, pas à chercher.", "correct": false}], "correct": "A", "explanation": "Remplacer un outil polyvalent par un outil spécifique aux documents qui valide les URL par rapport aux formats de documents corrige la cause racine en contraignant la capacité au niveau de l'interface. Cela suit le principe du moindre privilège, rendant le comportement de recherche indésirable impossible plutôt que simplement déconseillé.", "global_n": 10}, {"n": 11, "scenario": "Système de recherche multi-agents", "situation": "En recherchant un sujet large, vous observez que l'agent de recherche web et l'agent d'analyse de documents investiguent les mêmes sous-thèmes, entraînant une duplication substantielle dans leurs sorties. L'utilisation de tokens double presque sans augmentation proportionnelle de l'étendue ou de la profondeur de la recherche. Quelle est la manière la plus efficace de traiter cela ?", "question": "Quelle est la manière la plus efficace de traiter cela ?", "options": [{"letter": "A", "text": "Laisser les deux agents terminer en parallèle, puis faire dédupliquer les résultats qui se chevauchent par le coordinateur avant de les transmettre à l'agent de synthèse.", "correct": false}, {"letter": "B", "text": "Le coordinateur partitionne explicitement l'espace de recherche avant de déléguer, en assignant à chaque agent des sous-thèmes ou types de sources distincts.", "correct": true}, {"letter": "C", "text": "Implémenter un mécanisme d'état partagé où les agents consignent leur domaine de focus actuel afin que les autres agents puissent éviter dynamiquement la duplication pendant l'exécution.", "correct": false}, {"letter": "D", "text": "Passer à une exécution séquentielle où l'analyse de documents ne s'exécute qu'après la fin de la recherche web, en utilisant les résultats de la recherche web comme contexte pour éviter la duplication.", "correct": false}], "correct": "B", "explanation": "Faire partitionner explicitement l'espace de recherche par le coordinateur avant de déléguer est le plus efficace car cela traite la cause racine — des frontières de tâche floues — avant que tout travail ne commence. Cela préserve le parallélisme tout en évitant les efforts dupliqués et les tokens gaspillés.", "global_n": 11}, {"n": 12, "scenario": "Système de recherche multi-agents", "situation": "Pendant la recherche, le sous-agent de recherche web interroge trois catégories de sources avec des résultats différents : les bases de données académiques renvoient 15 articles pertinents, les rapports sectoriels renvoient « 0 résultat », et les bases de données de brevets renvoient « Connection timeout ». Lors de la conception de la propagation d'erreurs vers le coordinateur, quelle approche permet les meilleures décisions de récupération ?", "question": "Quelle approche permet les meilleures décisions de récupération ?", "options": [{"letter": "A", "text": "Agréger les résultats en une seule métrique de pourcentage de succès (p. ex. « 67 % de couverture des sources ») avec des logs détaillés disponibles à la demande.", "correct": false}, {"letter": "B", "text": "Signaler à la fois « timeout » et « 0 résultat » comme des échecs nécessitant l'intervention du coordinateur.", "correct": false}, {"letter": "C", "text": "Réessayer les échecs transitoires en interne et ne signaler que les erreurs persistantes.", "correct": false}, {"letter": "D", "text": "Distinguer les échecs d'accès (timeout) qui nécessitent une décision de réessai des résultats vides valides (« 0 résultat ») qui représentent des requêtes réussies.", "correct": true}], "correct": "D", "explanation": "Un timeout (échec d'accès) et « 0 résultat » (résultat vide valide) sont des issues sémantiquement différentes nécessitant des réponses différentes. Les distinguer permet au coordinateur de réessayer la base de données de brevets tout en acceptant le « 0 résultat » des rapports sectoriels comme une conclusion valide et informative.", "global_n": 12}, {"n": 13, "scenario": "Système de recherche multi-agents", "situation": "La surveillance de production montre une qualité de synthèse incohérente. Lorsque les résultats agrégés font ~75 000 tokens, l'agent de synthèse cite de manière fiable les informations des 15 000 premiers tokens (titres/extraits de recherche web) et des 10 000 derniers tokens (conclusions de l'analyse de documents), mais manque souvent des conclusions critiques dans les 50 000 tokens du milieu — même lorsqu'elles répondent directement à la question de recherche. Comment restructurer l'entrée agrégée ?", "question": "Comment restructurer l'entrée agrégée ?", "options": [{"letter": "A", "text": "Résumer toutes les sorties des sous-agents à moins de 20 000 tokens avant l'agrégation pour garder le contenu dans la plage de traitement fiable du modèle.", "correct": false}, {"letter": "B", "text": "Diffuser les résultats des sous-agents à l'agent de synthèse de manière incrémentale, en traitant d'abord les résultats de recherche web jusqu'à leur terme, puis en ajoutant les résultats d'analyse de documents.", "correct": false}, {"letter": "C", "text": "Placer un résumé des conclusions clés au début de l'entrée agrégée et organiser les résultats détaillés avec des en-têtes de section explicites pour faciliter la navigation.", "correct": true}, {"letter": "D", "text": "Implémenter une rotation qui alterne quel résultat de sous-agent apparaît en premier selon les tâches de recherche pour que les deux sources obtiennent à terme un positionnement de tête équivalent.", "correct": false}], "correct": "C", "explanation": "Placer un résumé des conclusions clés au début exploite les effets de primauté afin que les informations critiques se trouvent dans la position la plus fiablement traitée. Ajouter des en-têtes de section explicites tout au long aide le modèle à naviguer et à prêter attention au contenu du milieu, atténuant directement le phénomène « perdu au milieu ».", "global_n": 13}, {"n": 14, "scenario": "Système de recherche multi-agents", "situation": "Lors des tests, la sortie combinée de l'agent de recherche web (85 000 tokens incluant le contenu des pages) et de l'agent d'analyse de documents (70 000 tokens incluant des chaînes de raisonnement) totalise 155 000 tokens, mais l'agent de synthèse est le plus performant avec des entrées de moins de 50 000 tokens. Quelle solution est la plus efficace ?", "question": "Quelle solution est la plus efficace ?", "options": [{"letter": "A", "text": "Modifier les agents en amont pour qu'ils renvoient des données structurées (faits clés, citations, scores de pertinence) au lieu d'un contenu et d'un raisonnement verbeux.", "correct": true}, {"letter": "B", "text": "Ajouter un agent de résumé intermédiaire qui condense les conclusions avant de les transmettre à la synthèse.", "correct": false}, {"letter": "C", "text": "Faire traiter par l'agent de synthèse les conclusions en lots séquentiels, en maintenant l'état entre les appels.", "correct": false}, {"letter": "D", "text": "Stocker les conclusions dans une base de données vectorielle et donner à l'agent de synthèse des outils de recherche pour l'interroger pendant son travail.", "correct": false}], "correct": "A", "explanation": "Modifier les agents en amont pour qu'ils renvoient des données structurées corrige la cause racine en réduisant le volume de tokens à la source tout en préservant les informations essentielles. Cela évite de transmettre un contenu de page volumineux et des traces de raisonnement qui gonflent les tokens sans améliorer l'étape de synthèse.", "global_n": 14}, {"n": 15, "scenario": "Système de recherche multi-agents", "situation": "Lors des tests, vous observez que l'agent de synthèse a souvent besoin de vérifier des affirmations précises lors de la fusion des résultats. Actuellement, lorsqu'une vérification est nécessaire, l'agent de synthèse rend le contrôle au coordinateur, qui appelle l'agent de recherche web puis relance la synthèse avec les résultats. Cela ajoute 2 à 3 boucles supplémentaires par tâche et augmente la latence de 40 %. Votre évaluation montre que 85 % de ces vérifications sont de simples vérifications de faits (dates, noms, statistiques) et 15 % nécessitent une recherche plus approfondie. Quelle approche réduit le plus efficacement la surcharge tout en préservant la fiabilité du système ?", "question": "Quelle approche est la plus efficace ?", "options": [{"letter": "A", "text": "Donner à l'agent de synthèse l'accès à tous les outils de recherche web afin qu'il puisse gérer tout besoin de vérification directement sans boucles via le coordinateur.", "correct": false}, {"letter": "B", "text": "Faire accumuler par l'agent de synthèse tous les besoins de vérification et les renvoyer en lot au coordinateur à la fin, qui les envoie alors tous à la fois à l'agent de recherche web.", "correct": false}, {"letter": "C", "text": "Faire mettre en cache de manière proactive par l'agent de recherche web du contexte supplémentaire autour de chaque source pendant la recherche initiale, en prévision du besoin de vérification de la synthèse.", "correct": false}, {"letter": "D", "text": "Donner à l'agent de synthèse un outil `verify_fact` à portée limitée pour les vérifications simples, tout en routant les vérifications complexes via le coordinateur vers l'agent de recherche web.", "correct": true}], "correct": "D", "explanation": "Un outil de vérification de faits à portée limitée permet à l'agent de synthèse de gérer 85 % des vérifications simples directement, éliminant la plupart des boucles, tout en préservant le chemin de délégation par le coordinateur pour les 15 % de vérifications complexes. Cela applique le moindre privilège tout en réduisant significativement la latence.", "global_n": 15}, {"n": 16, "scenario": "Claude Code pour l'intégration continue", "situation": "Votre pipeline CI exécute le CLI Claude Code (en mode `--print`) en utilisant CLAUDE.md pour fournir le contexte du projet pour la revue de code, et les développeurs trouvent généralement les revues substantielles. Cependant, ils signalent que l'intégration des conclusions dans le workflow est difficile — Claude produit des paragraphes narratifs qui doivent être copiés manuellement dans les commentaires de PR. L'équipe veut publier automatiquement chaque conclusion comme un commentaire inline distinct au bon endroit dans le code, ce qui nécessite des données structurées avec chemin de fichier, numéro de ligne, niveau de gravité et correction suggérée. Quelle approche est la plus efficace ?", "question": "Quelle approche est la plus efficace ?", "options": [{"letter": "A", "text": "Ajouter une section « Output Format for Review » à CLAUDE.md avec des exemples de conclusions structurées pour que Claude apprenne le format attendu à partir du contexte du projet.", "correct": false}, {"letter": "B", "text": "Utiliser les drapeaux CLI `--output-format json` et `--json-schema` pour imposer des conclusions structurées, puis analyser la sortie pour publier des commentaires inline via l'API GitHub.", "correct": true}, {"letter": "C", "text": "Inclure des instructions de formatage explicites dans le prompt de revue exigeant que chaque conclusion suive un modèle analysable comme `[FILE:path] [LINE:n] [SEVERITY:level] ...`.", "correct": false}, {"letter": "D", "text": "Garder le format de revue narratif mais ajouter une étape de résumé qui utilise Claude pour générer un résumé JSON structuré des conclusions.", "correct": false}], "correct": "B", "explanation": "Utiliser `--output-format json` avec `--json-schema` impose une sortie structurée au niveau du CLI, garantissant un JSON bien formé avec les champs requis (chemin de fichier, numéro de ligne, gravité, correction suggérée) qui peut être analysé de manière fiable et publié comme commentaire inline sur la PR via l'API GitHub. Cela exploite des capacités CLI intégrées conçues spécifiquement pour la sortie structurée.", "global_n": 16}, {"n": 17, "scenario": "Claude Code pour l'intégration continue", "situation": "Votre équipe utilise Claude Code pour générer des suggestions de code, mais vous remarquez un motif : les problèmes non évidents — optimisations de performance qui cassent des cas limites, nettoyages qui modifient le comportement de manière inattendue — ne sont détectés que lorsqu'un autre membre de l'équipe révise la PR. Le raisonnement de Claude pendant la génération montre qu'il a considéré ces cas mais a conclu que son approche était correcte. Quelle approche traite directement la cause racine de cette limite d'auto-vérification ?", "question": "Quelle approche traite directement la cause racine ?", "options": [{"letter": "A", "text": "Exécuter une deuxième instance indépendante de Claude Code pour réviser les changements sans accès au raisonnement du générateur.", "correct": true}, {"letter": "B", "text": "Activer le mode de réflexion étendue (extended thinking) pour l'étape de génération afin de permettre une délibération plus approfondie avant de produire des suggestions.", "correct": false}, {"letter": "C", "text": "Ajouter des instructions d'auto-revue explicites au prompt de génération demandant à Claude de critiquer ses propres suggestions avant de finaliser la sortie.", "correct": false}, {"letter": "D", "text": "Inclure les fichiers de test complets et la documentation dans le contexte du prompt pour que Claude comprenne mieux le comportement attendu pendant la génération.", "correct": false}], "correct": "A", "explanation": "Une deuxième instance Claude Code indépendante sans accès au raisonnement du générateur traite directement la cause racine en évitant le biais de confirmation. Cette perspective « œil neuf » reflète la revue par les pairs chez les humains, où un autre relecteur détecte les problèmes que l'auteur a rationalisés.", "global_n": 17}, {"n": 18, "scenario": "Claude Code pour l'intégration continue", "situation": "Votre composant de revue de code est itératif : Claude analyse le fichier modifié, puis peut demander des fichiers connexes (imports, classes de base, tests) via des appels d'outils pour comprendre le contexte avant de fournir un retour final. Votre application définit un outil qui permet à Claude de demander le contenu des fichiers ; Claude appelle l'outil, obtient les résultats et poursuit l'analyse. Vous évaluez le traitement par lots pour réduire le coût d'API. Quelle est la principale limite technique à considérer pour le traitement par lots de ce workflow ?", "question": "Quelle est la principale limite technique ?", "options": [{"letter": "A", "text": "Le traitement par lots n'inclut pas d'identifiants de corrélation pour faire correspondre les sorties aux requêtes d'entrée.", "correct": false}, {"letter": "B", "text": "Le modèle asynchrone ne peut pas exécuter des outils en cours de requête et renvoyer les résultats pour que Claude poursuive l'analyse.", "correct": true}, {"letter": "C", "text": "La Batch API ne prend pas en charge les définitions d'outils dans les paramètres de requête.", "correct": false}, {"letter": "D", "text": "La latence de traitement par lots pouvant atteindre 24 heures est trop lente pour le retour sur les pull requests, bien que le workflow fonctionnerait par ailleurs.", "correct": false}], "correct": "B", "explanation": "Un modèle de Batch API asynchrone « fire-and-forget » n'a aucun mécanisme pour intercepter un appel d'outil pendant une requête, exécuter l'outil et renvoyer les résultats pour que Claude poursuive l'analyse. C'est fondamentalement incompatible avec les workflows d'appels d'outils itératifs qui nécessitent plusieurs tours requête/réponse d'outils au sein d'une seule interaction logique.", "global_n": 18}, {"n": 19, "scenario": "Claude Code pour l'intégration continue", "situation": "Votre système CI/CD exécute trois analyses basées sur Claude : (1) des vérifications de style rapides sur chaque PR qui bloquent la fusion jusqu'à leur achèvement, (2) des audits de sécurité hebdomadaires complets de toute la base de code, et (3) une génération nocturne de cas de test pour les modules récemment modifiés. La Message Batches API offre 50 % d'économies mais le traitement peut prendre jusqu'à 24 heures. Vous voulez optimiser le coût d'API tout en maintenant une expérience développeur acceptable. Quelle combinaison fait correspondre correctement chaque tâche à une approche d'API ?", "question": "Quelle combinaison est correcte ?", "options": [{"letter": "A", "text": "Utiliser la Message Batches API pour les trois tâches afin de maximiser les 50 % d'économies, en configurant le pipeline pour interroger l'achèvement des lots.", "correct": false}, {"letter": "B", "text": "Utiliser des appels synchrones pour les vérifications de style de PR ; utiliser la Message Batches API pour les audits de sécurité hebdomadaires et la génération nocturne de tests.", "correct": true}, {"letter": "C", "text": "Utiliser des appels synchrones pour les trois tâches afin d'obtenir des temps de réponse cohérents, en s'appuyant sur la mise en cache de prompts pour réduire les coûts sur toutes les charges de travail.", "correct": false}, {"letter": "D", "text": "Utiliser des appels synchrones pour les vérifications de style de PR et la génération nocturne de tests ; utiliser la Message Batches API uni const state = { current: 0, answers: {} };

function md(text) {
  if (!text) return '';
  return text
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
    .replace(/\n/g, ' ');
}

function buildSidebar() {
  const list = document.getElementById('sidebarList');
  document.getElementById('totalCount').textContent = QUESTIONS.length;
  let currentScenario = null;
  let groupEl = null;
  QUESTIONS.forEach((q, idx) => {
    if (q.scenario !== currentScenario) {
      currentScenario = q.scenario;
      const sg = document.createElement('div');
      sg.className = 'scenario-group';
      const lbl = document.createElement('div');
      lbl.className = 'scenario-label';
      lbl.textContent = q.scenario;
      sg.appendChild(lbl);
      groupEl = sg;
      list.appendChild(sg);
    }
    const btn = document.createElement('button');
    btn.className = 'q-btn';
    btn.id = 'sb-' + idx;
    btn.onclick = () => goto(idx);
    btn.innerHTML = '<span class="q-dot"></span> Q' + q.global_n;
    groupEl.appendChild(btn);
  });
}

function updateSidebar() {
  QUESTIONS.forEach((q, idx) => {
    const btn = document.getElementById('sb-' + idx);
    if (!btn) return;
    btn.className = 'q-btn';
    if (idx === state.current) btn.classList.add('active');
    const ans = state.answers[q.global_n];
    if (ans !== undefined) {
      btn.classList.add(ans === q.correct ? 'answered-correct' : 'answered-wrong');
    }
  });
  document.getElementById('answeredCount').textContent = Object.keys(state.answers).length;
}

function renderQuestion(idx) {
  const q = QUESTIONS[idx];
  const chosen = state.answers[q.global_n];
  const locked = chosen !== undefined;

  document.getElementById('qCounter').textContent = (idx + 1) + ' / ' + QUESTIONS.length;
  document.getElementById('prevBtn').disabled = idx === 0;
  document.getElementById('nextBtn').disabled = idx === QUESTIONS.length - 1;

  const optionsHtml = q.options.map(opt => {
    let cls = 'option';
    if (locked) {
      cls += ' locked';
      if (opt.correct) cls += ' correct';
      else if (opt.letter === chosen) cls += ' wrong';
      else cls += ' dimmed';
    }
    return '<div class="' + cls + '" data-letter="' + opt.letter + '" onclick="answer(' + q.global_n + ', \'' + opt.letter + '\')">' +
      '<div class="opt-letter">' + opt.letter + '</div>' +
      '<div class="opt-text">' + md(opt.text) + '</div></div>';
  }).join('');

  const expl = locked
    ? '<div class="explanation show"><strong>Pourquoi ' + q.correct + ' :</strong> ' + md(q.explanation) + '</div>'
    : '<div class="explanation"></div>';

  document.getElementById('qCard').innerHTML =
    '<div class="q-number">Question ' + q.global_n + '</div>' +
    '<div class="q-scenario">' + q.scenario + '</div>' +
    '<div class="q-situation">' + md(q.situation) + '</div>' +
    '<div class="q-prompt">' + md(q.question) + '</div>' +
    '<div class="options">' + optionsHtml + '</div>' +
    expl;
}

function answer(globalN, letter) {
  if (state.answers[globalN] !== undefined) return;
  state.answers[globalN] = letter;
  renderQuestion(state.current);
  updateSidebar();
}

function navigate(dir) { goto(state.current + dir); }

function goto(idx) {
  if (idx < 0 || idx >= QUESTIONS.length) return;
  document.getElementById('questionScreen').classList.add('active');
  document.getElementById('summaryScreen').classList.remove('active');
  state.current = idx;
  renderQuestion(idx);
  updateSidebar();
}

function showSummary() {
  document.getElementById('questionScreen').classList.remove('active');
  document.getElementById('summaryScreen').classList.add('active');

  const total = QUESTIONS.length;
  const answered = Object.keys(state.answers).length;
  let correct = 0;
  const wrongByScenario = {};

  QUESTIONS.forEach(q => {
    const ans = state.answers[q.global_n];
    if (ans === undefined) return;
    if (ans === q.correct) {
      correct++;
    } else {
      if (!wrongByScenario[q.scenario]) wrongByScenario[q.scenario] = [];
      wrongByScenario[q.scenario].push({ q: q, chosen: ans });
    }
  });

  const wrong = answered - correct;
  const pct = answered > 0 ? Math.round(correct / answered * 100) : 0;
  const unanswered = total - answered;

  let wrongGroupsHtml = '';
  for (const scenario in wrongByScenario) {
    const items = wrongByScenario[scenario];
    const rows = items.map(item => {
      const chosenOpt = item.q.options.find(o => o.letter === item.chosen);
      const correctOpt = item.q.options.find(o => o.letter === item.q.correct);
      return '<div class="wrong-item">' +
        '<div class="wi-n">Q' + item.q.global_n + '</div>' +
        '<div class="wi-q">' +
          '<div class="wi-situation">' + md(item.q.situation) + '</div>' +
          '<div class="wi-prompt">' + md(item.q.question) + '</div>' +
          '<div class="wi-ans">' +
            'Votre réponse : <span class="wi-wrong-tag">' + item.chosen + '</span> — ' + md(chosenOpt ? chosenOpt.text : '') + '<br>' +
            'Correct : <span class="wi-correct-tag">' + item.q.correct + '</span> — ' + md(correctOpt ? correctOpt.text : '') +
          '</div>' +
        '</div></div>';
    }).join('');
    wrongGroupsHtml +=
      '<div class="group-block">' +
        '<div class="group-title">' + scenario +
          '<span class="group-badge">' + items.length + ' incorrectes</span></div>' +
        rows +
      '</div>';
  }

  const unansweredNote = unanswered > 0
    ? '<p style="color:#e53e3e;font-size:14px;margin-bottom:20px;font-weight:600;">&#9888; ' + unanswered + ' question(s) sans réponse.</p>'
    : '';

  document.getElementById('summaryContent').innerHTML =
    '<h1>Examen terminé</h1>' +
    '<p class="summary-subtitle">Vous avez répondu à ' + answered + ' sur ' + total + ' questions.</p>' +
    unansweredNote +
    '<div class="score-grid">' +
      '<div class="score-card total"><div class="big">' + pct + '%</div><div class="label">Score</div></div>' +
      '<div class="score-card correct-c"><div class="big">' + correct + '</div><div class="label">Correctes</div></div>' +
      '<div class="score-card wrong-c"><div class="big">' + wrong + '</div><div class="label">Incorrectes</div></div>' +
    '</div>' +
    (wrong > 0
      ? '<div class="section-title">Réponses incorrectes par scénario</div>' + wrongGroupsHtml
      : '<p style="color:#38a169;font-weight:700;font-size:17px;">Toutes les réponses sont correctes !</p>') +
    '<button class="restart-btn" onclick="restart()">Recommencer l\'examen</button>';
}

function restart() {
  state.answers = {};
  state.current = 0;
  document.getElementById('questionScreen').classList.add('active');
  document.getElementById('summaryScreen').classList.remove('active');
  renderQuestion(0);
  updateSidebar();
}

buildSidebar();
renderQuestion(0);
updateSidebar();
</script>
</body>
</html>
